<!-- @dsCard group="Type" viewport="700x170" name="Confirmation code" subtitle="codeHuge — JetBrains Mono, oversized, built to be read across a room" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--sb-background);padding:22px}
  .card{background:var(--sb-surface);border-radius:var(--sb-radius-medium);padding:16px 18px;display:flex;flex-direction:column;gap:8px}
  .top{display:flex;align-items:center;justify-content:space-between}
  .lab{font-family:var(--sb-font-rounded);font-weight:500;font-size:12px;letter-spacing:1.4px;text-transform:uppercase;color:var(--sb-text-secondary)}
  .pill{font-family:var(--sb-font-rounded);font-weight:500;font-size:11px;letter-spacing:1px;color:var(--sb-accent);background:var(--sb-accent-wash);padding:3px 9px;border-radius:999px}
  .code{font-family:var(--sb-font-mono);font-weight:700;font-size:40px;color:var(--sb-text-primary);letter-spacing:1px}
</style>
</head>
<body>
  <div class="card">
    <div class="top"><span class="lab">Confirmation code</span><span class="pill">TAP TO COPY</span></div>
    <span class="code">BS-44721</span>
  </div>
</body>
</html>
