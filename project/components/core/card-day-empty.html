<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css">
<style>
  html,body{margin:0}
  body{background:var(--sb-background);padding:18px}
  #root{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:center}
  .panel{background:var(--sb-surface);border-radius:var(--sb-radius-medium)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { DayPicker, EmptyState } = window.StayBusyDesignSystem_0220d6;
  function Demo() {
    const [date, setDate] = React.useState(() => { const d=new Date(); d.setDate(d.getDate()+1); d.setHours(0,0,0,0); return d; });
    return (
      <>
        <div className="panel"><DayPicker date={date} onChange={setDate} /></div>
        <div className="panel"><EmptyState icon="calendar-plus" title="Nothing scheduled" message="Add a block to start mapping out your day." actionLabel="Add a block" onAction={()=>{}} /></div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
