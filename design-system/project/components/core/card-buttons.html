<!-- @dsCard group="Components" viewport="700x230" name="Buttons, chips & badges" subtitle="Primary/secondary buttons, category chips, status pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
  html,body{margin:0}
  body{background:var(--sb-background);padding:22px}
  #root{display:flex;flex-direction:column;gap:18px}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, CategoryChip, Badge } = window.StayBusyDesignSystem_0220d6;
  function Demo() {
    const [cat, setCat] = React.useState('gig');
    return (
      <>
        <div className="row">
          <Button variant="primary" icon="car">Drive</Button>
          <Button variant="primary" icon="tram">Transit</Button>
          <Button variant="secondary" icon="arrow-up-right">Details</Button>
          <Button variant="secondary" disabled>Disabled</Button>
        </div>
        <div className="row">
          {['gig','travel','food','social','work','explore','rest','admin'].map(c => (
            <CategoryChip key={c} category={c} selected={cat===c} onClick={() => setCat(c)} />
          ))}
        </div>
        <div className="row">
          <Badge tone="now">Now</Badge>
          <Badge tone="soft">Tap to copy</Badge>
          <Badge tone="success" icon="check">Copied</Badge>
          <Badge tone="neutral">3 blocks</Badge>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
