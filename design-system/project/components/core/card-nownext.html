<!-- @dsCard group="Components" viewport="700x300" name="Now / Next bar" subtitle="The pinned status bar in all three states — current, free-until, done" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
  html,body{margin:0}
  body{background:var(--sb-background);padding:22px}
  #root{display:flex;flex-direction:column;gap:14px}
  .lab{font-family:var(--sb-font-mono);font-size:11px;color:var(--sb-text-tertiary);margin:2px 0 -6px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { NowNextBar } = window.StayBusyDesignSystem_0220d6;
  const at = (day,h,m=0) => { const d=new Date(); d.setDate(d.getDate()+day); d.setHours(h,m,0,0); return d; };
  // anchor "now" at 14:45 today for the current state
  const noon = (() => { const d=new Date(); d.setHours(14,45,0,0); return d; })();
  const blocks = [
    {title:'Soundcheck', start:at(0,14), end:at(0,15,30), category:'gig'},
    {title:'Green room rest', start:at(0,16), end:at(0,18,30), category:'rest'},
    {title:'Flight LGA → ORD', start:at(1,9,30), end:at(1,12), category:'travel'},
  ];
  function Demo() {
    return (
      <>
        <div className="lab">state: current (live ticking)</div>
        <NowNextBar blocks={blocks} now={noon} />
        <div className="lab">state: done for today + tomorrow</div>
        <NowNextBar blocks={[blocks[2]]} now={(()=>{const d=new Date();d.setHours(20,0,0,0);return d;})()} />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
