<!-- @dsCard group="Type" viewport="700x170" name="Display & countdown" subtitle="The Now-bar timer — heavy Nunito, monospaced digits so it never jitters" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--sb-background);padding:22px 24px;display:flex;flex-direction:column;justify-content:center;gap:6px}
  .eyebrow{font-family:var(--sb-font-rounded);font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--sb-text-secondary)}
  .timer{font-family:var(--sb-font-rounded);font-weight:800;font-size:52px;line-height:1;color:var(--sb-text-primary);font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
  .meta{font-family:var(--sb-font-mono);font-size:12px;color:var(--sb-text-tertiary);margin-top:10px}
</style>
</head>
<body>
  <span class="eyebrow">Ends in</span>
  <span class="timer">1h 24m</span>
  <span class="meta">displayCountdown · 800 · tabular-nums</span>
</body>
</html>
