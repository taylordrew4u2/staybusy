<!-- @dsCard group="Brand" viewport="700x180" name="Category icons" subtitle="Color is never the only signal — every category pairs with a Phosphor glyph" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
  html,body{margin:0}
  body{background:var(--sb-background);font-family:var(--sb-font-rounded);padding:20px;
       display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .tile{width:54px;height:54px;border-radius:var(--sb-radius-small);display:flex;align-items:center;justify-content:center;font-size:26px}
  .lab{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--sb-text-secondary)}
</style>
</head>
<body>
  <div class="cell"><div class="tile" style="background:rgba(229,57,53,.18);color:var(--sb-cat-gig-text)"><i class="ph-fill ph-microphone-stage"></i></div><span class="lab">Gig</span></div>
  <div class="cell"><div class="tile" style="background:rgba(245,158,10,.18);color:var(--sb-cat-travel)"><i class="ph-fill ph-airplane-tilt"></i></div><span class="lab">Travel</span></div>
  <div class="cell"><div class="tile" style="background:rgba(76,175,80,.18);color:var(--sb-cat-food)"><i class="ph-fill ph-fork-knife"></i></div><span class="lab">Food</span></div>
  <div class="cell"><div class="tile" style="background:rgba(237,89,153,.18);color:var(--sb-cat-social)"><i class="ph-fill ph-users"></i></div><span class="lab">Social</span></div>
  <div class="cell"><div class="tile" style="background:rgba(66,138,245,.18);color:var(--sb-cat-work)"><i class="ph-fill ph-laptop"></i></div><span class="lab">Work</span></div>
  <div class="cell"><div class="tile" style="background:rgba(140,92,245,.18);color:var(--sb-cat-explore-text)"><i class="ph-fill ph-map-trifold"></i></div><span class="lab">Explore</span></div>
  <div class="cell"><div class="tile" style="background:rgba(115,140,153,.18);color:var(--sb-cat-rest)"><i class="ph-fill ph-moon-stars"></i></div><span class="lab">Rest</span></div>
  <div class="cell"><div class="tile" style="background:rgba(158,158,158,.18);color:var(--sb-cat-admin)"><i class="ph-fill ph-tray"></i></div><span class="lab">Admin</span></div>
</body>
</html>
