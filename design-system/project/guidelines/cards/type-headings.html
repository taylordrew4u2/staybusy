<!-- @dsCard group="Type" viewport="700x210" name="Heading scale" subtitle="titleLarge for screen headers, title for block names — both rounded" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--sb-background);padding:24px;display:flex;flex-direction:column;justify-content:center;gap:18px}
  .line{display:flex;align-items:baseline;gap:14px}
  .meta{font-family:var(--sb-font-mono);font-size:12px;color:var(--sb-text-tertiary);margin-left:auto}
  .tlg{font-family:var(--sb-font-rounded);font-weight:800;font-size:30px;color:var(--sb-text-primary);letter-spacing:-0.01em}
  .t{font-family:var(--sb-font-rounded);font-weight:700;font-size:20px;color:var(--sb-text-primary)}
</style>
</head>
<body>
  <div class="line"><span class="tlg">Soundcheck</span><span class="meta">titleLarge · 800</span></div>
  <div class="line"><span class="t">Travel to venue</span><span class="meta">title · 700</span></div>
</body>
</html>
