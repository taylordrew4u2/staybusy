<!-- @dsCard group="Colors" viewport="700x150" name="Brand & Status" subtitle="One red accent; amber warning and green success used only for state" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--sb-background);font-family:var(--sb-font-rounded);padding:20px;display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--sb-radius-medium);padding:14px;display:flex;flex-direction:column;justify-content:flex-end;min-height:108px}
  .name{font-weight:800;font-size:14px;color:#fff}
  .hex{font-family:var(--sb-font-mono);font-size:12px;color:rgba(255,255,255,.7);margin-top:3px}
  .role{font-size:11px;color:rgba(255,255,255,.85);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:auto;font-weight:700}
</style>
</head>
<body>
  <div class="sw" style="background:var(--sb-accent)"><div class="role">Accent</div><div class="name">accent</div><div class="hex">#E53935</div></div>
  <div class="sw" style="background:var(--sb-warning)"><div class="role">Warning</div><div class="name" style="color:#1a1205">warning</div><div class="hex" style="color:rgba(0,0,0,.55)">#F5A623</div></div>
  <div class="sw" style="background:var(--sb-success)"><div class="role" style="color:rgba(0,0,0,.7)">Success</div><div class="name" style="color:#05210d">success</div><div class="hex" style="color:rgba(0,0,0,.55)">#34C759</div></div>
</body>
</html>
