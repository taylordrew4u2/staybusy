<!-- @dsCard group="Colors" viewport="700x150" name="Text on canvas" subtitle="Three text tiers, all ≥4.5:1 on their real background" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--sb-background);font-family:var(--sb-font-rounded);padding:22px 24px}
  .row{display:flex;align-items:baseline;gap:16px;padding:9px 0}
  .t{font-weight:800;font-size:22px}
  .meta{font-family:var(--sb-font-mono);font-size:12px;color:var(--sb-text-tertiary);margin-left:auto}
  .tok{font-size:13px;color:var(--sb-text-tertiary);font-family:var(--sb-font-mono)}
</style>
</head>
<body>
  <div class="row"><span class="t" style="color:var(--sb-text-primary)">Primary — what am I doing now</span><span class="tok">textPrimary</span><span class="meta">#F5F5F7</span></div>
  <div class="row"><span class="t" style="color:var(--sb-text-secondary)">Secondary — eyebrows & metadata</span><span class="tok">textSecondary</span><span class="meta">#A1A1AA</span></div>
  <div class="row"><span class="t" style="color:var(--sb-text-tertiary)">Tertiary — hour labels, hints</span><span class="tok">textTertiary</span><span class="meta">#6B6B73</span></div>
</body>
</html>
