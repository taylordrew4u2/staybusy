<!-- @dsCard group="Type" viewport="700x200" name="Body & caption" subtitle="Medium-weight body copy; caption for time ranges and eyebrows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--sb-background);padding:24px;display:flex;flex-direction:column;justify-content:center;gap:16px}
  .line{display:flex;align-items:baseline;gap:14px}
  .meta{font-family:var(--sb-font-mono);font-size:12px;color:var(--sb-text-tertiary);margin-left:auto}
  .b{font-family:var(--sb-font-rounded);font-weight:500;font-size:16px;color:var(--sb-text-primary)}
  .c{font-family:var(--sb-font-rounded);font-weight:500;font-size:13px;color:var(--sb-text-secondary);font-variant-numeric:tabular-nums}
  .eb{font-family:var(--sb-font-rounded);font-weight:500;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--sb-text-secondary)}
</style>
</head>
<body>
  <div class="line"><span class="b">Doors 8, openers 8:30, on stage 9.</span><span class="meta">body · 500</span></div>
  <div class="line"><span class="c">2:00 PM – 3:30 PM</span><span class="meta">caption · mono digits</span></div>
  <div class="line"><span class="eb">Free until</span><span class="meta">eyebrow · tracked</span></div>
</body>
</html>
