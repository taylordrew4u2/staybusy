<!-- @dsCard group="Colors" viewport="700x230" name="Category palette" subtitle="Eight activity colors — stripes & fills. gig/explore lighten for text use" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--sb-background);font-family:var(--sb-font-rounded);padding:20px;
       display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .cat{background:var(--sb-surface);border-radius:var(--sb-radius-small);padding:12px 12px 11px;display:flex;flex-direction:column;gap:7px;position:relative;overflow:hidden}
  .stripe{position:absolute;left:0;top:8px;bottom:8px;width:4px;border-radius:3px}
  .top{display:flex;align-items:center;gap:8px;padding-left:6px}
  .dot{width:12px;height:12px;border-radius:50%}
  .lab{font-weight:800;font-size:15px;color:var(--sb-text-primary)}
  .hex{font-family:var(--sb-font-mono);font-size:11px;color:var(--sb-text-tertiary);padding-left:6px}
</style>
</head>
<body>
  <div class="cat"><div class="stripe" style="background:var(--sb-cat-gig)"></div><div class="top"><span class="dot" style="background:var(--sb-cat-gig)"></span><span class="lab">Gig</span></div><div class="hex">#E53935</div></div>
  <div class="cat"><div class="stripe" style="background:var(--sb-cat-travel)"></div><div class="top"><span class="dot" style="background:var(--sb-cat-travel)"></span><span class="lab">Travel</span></div><div class="hex">#F59E0A</div></div>
  <div class="cat"><div class="stripe" style="background:var(--sb-cat-food)"></div><div class="top"><span class="dot" style="background:var(--sb-cat-food)"></span><span class="lab">Food</span></div><div class="hex">#4CAF50</div></div>
  <div class="cat"><div class="stripe" style="background:var(--sb-cat-social)"></div><div class="top"><span class="dot" style="background:var(--sb-cat-social)"></span><span class="lab">Social</span></div><div class="hex">#ED5999</div></div>
  <div class="cat"><div class="stripe" style="background:var(--sb-cat-work)"></div><div class="top"><span class="dot" style="background:var(--sb-cat-work)"></span><span class="lab">Work</span></div><div class="hex">#428AF5</div></div>
  <div class="cat"><div class="stripe" style="background:var(--sb-cat-explore)"></div><div class="top"><span class="dot" style="background:var(--sb-cat-explore)"></span><span class="lab">Explore</span></div><div class="hex">#8C5CF5</div></div>
  <div class="cat"><div class="stripe" style="background:var(--sb-cat-rest)"></div><div class="top"><span class="dot" style="background:var(--sb-cat-rest)"></span><span class="lab">Rest</span></div><div class="hex">#738C99</div></div>
  <div class="cat"><div class="stripe" style="background:var(--sb-cat-admin)"></div><div class="top"><span class="dot" style="background:var(--sb-cat-admin)"></span><span class="lab">Admin</span></div><div class="hex">#9E9E9E</div></div>
</body>
</html>
